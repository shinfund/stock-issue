<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>주식 이슈</title>
<link rel="preload" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"></noscript>
<style>
:root{
  --sky:#378ADD; --sky50:#E6F1FB; --sky100:#B5D4F4; --sky600:#185FA5; --sky800:#0C447C;
  --teal:#1D9E75; --teal50:#E1F5EE; --teal600:#147a5a; --teal800:#085041;
  --coral:#D85A30; --coral50:#FAECE7; --coral800:#712B13;
  --amber:#BA7517; --amber50:#FAEEDA; --amber800:#633806;
  --green:#639922; --green50:#EAF3DE; --green800:#27500A;
  --purple:#534AB7; --purple50:#EEEDFE; --purple800:#3C3489;
  --red:#D8302F; --red50:#FBE9E8; --blue:#2563C9; --blue50:#E7EFFB;
  --gray50:#F1EFE8; --gray600:#5F5E5A;
  --bg:#F5F8FF; --card:#FFFFFF; --border:#E0EAF5; --border2:#EBF3FF;
  --txt:#1A2535; --txt2:#3D4F68; --txt3:#6B7E99;
  --r8:8px; --r12:12px; --r14:14px; --r16:16px; --r20:20px;
  --shadow:0 2px 12px rgba(55,138,221,.08);
  --shadow-hover:0 6px 24px rgba(55,138,221,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Pretendard',-apple-system,sans-serif;
  font-size:15px; line-height:1.6; word-break:keep-all;
  color:var(--txt); background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1100px; margin:0 auto; min-height:100dvh;}

/* ── HEADER ── */
.hdr-wrap{position:fixed; top:0; left:0; right:0; z-index:50; box-shadow:0 2px 12px rgba(12,68,124,.18);}
.header{
  background:var(--sky800);
  padding:max(12px,env(safe-area-inset-top)) 16px 12px;
  display:flex; align-items:center; justify-content:space-between;
  max-width:1100px; margin:0 auto;
}
.header-left{display:flex; align-items:center; gap:10px; flex-shrink:0;}
.logo-mark{
  width:38px; height:38px; background:rgba(255,255,255,.15);
  border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.logo-title{font-size:17px; font-weight:800; color:#fff; letter-spacing:-.02em;}
.logo-sub{font-size:11.5px; color:rgba(255,255,255,.8);}
.header-right{display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0;}
.header-btns{display:flex; gap:7px;}
.hdr-btn{
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.35);
  color:#fff; border-radius:18px; padding:5px 12px;
  font-size:12.5px; font-family:inherit; cursor:pointer;
  display:flex; align-items:center; gap:5px; min-height:32px;
  -webkit-tap-highlight-color:transparent; transition:.18s;
}
.hdr-btn:hover{background:rgba(255,255,255,.25);}
.hdr-btn:disabled{opacity:.5; cursor:not-allowed;}
.hdr-btn-dot{width:7px; height:7px; border-radius:50%; flex-shrink:0; background:#6EE7B7;}
.hdr-btn-dot.off{background:#FCA5A5;}
.last-update{font-size:10.5px; color:rgba(255,255,255,.75);}
@keyframes spin-icon{to{transform:rotate(360deg)}}
.spinning{animation:spin-icon .8s linear infinite; display:inline-block;}
/* ── 데모 배너 (KPI 위, 스크롤 따라가는 일반 흐름) ── */
.demo-banner{background:#FFF3CD;color:#7B5200;font-size:12px;font-weight:700;text-align:center;padding:6px 12px;border-bottom:1px solid #FAC775;display:none;max-width:1100px;margin:0 auto;}
.demo-banner.on{display:block;}

/* ── TAB NAV (텍스트 전용 · 이모지/아이콘/SVG 미사용) ── */
.top-nav{background:var(--sky50);border-bottom:1.5px solid var(--border);display:flex;padding:0 6px;max-width:1100px;margin:0 auto;}
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;border:none;background:transparent;color:var(--txt2);font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;padding:12px 4px;-webkit-tap-highlight-color:transparent;transition:color .15s;position:relative;white-space:nowrap}
.tab-btn.on{color:var(--sky600)}
.tab-btn.on::after{content:'';position:absolute;bottom:0;left:12%;right:12%;height:2.5px;background:var(--sky);border-radius:2px 2px 0 0}
.tab-btn:hover:not(.on){color:var(--txt)}

/* ── MAIN ── */
.main{padding:14px;}
.panel{display:none;}
.panel.on{display:block;animation:fade .25s;}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── KPI ── */
.kpi-row{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.kpi-card{flex:1;min-width:76px;background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:11px 12px;text-align:center;box-shadow:var(--shadow)}
.kpi-card .num{font-size:21px;font-weight:900;line-height:1.05}
.kpi-card .lbl{font-size:11.5px;margin-top:4px;font-weight:600;color:var(--txt3)}
.kpi-up .num{color:var(--red)} .kpi-down .num{color:var(--blue)}
.kpi-core .num{color:var(--coral)} .kpi-tot .num{color:var(--sky600)}
.kpi-amt .num{color:var(--purple)} .kpi-teal .num{color:var(--teal600)}

/* ── FILTER ── */
.toolbar{background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:11px 13px;margin-bottom:14px;box-shadow:var(--shadow)}
.f-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.f-sel-wrap{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.f-sel{padding:7px 10px;border-radius:var(--r8);border:1.5px solid var(--border);font-size:13px;font-family:inherit;color:var(--txt);background:var(--card);outline:none;cursor:pointer;flex:1;min-width:0;transition:border .15s}
.f-sel:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(55,138,221,.1)}
.f-sel.active{border-color:var(--sky);color:var(--sky600);font-weight:700;background:var(--sky50)}
.f-active-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.f-active-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:16px;font-size:11.5px;font-weight:700;background:var(--sky50);color:var(--sky600);border:1.5px solid var(--sky100);white-space:nowrap}
.f-active-chip .x{cursor:pointer;font-size:11px;margin-left:2px;opacity:.7}
.f-active-chip .x:hover{opacity:1;color:var(--coral)}
.sel,.search-box{padding:7px 11px;border-radius:var(--r8);border:1.5px solid var(--border);font-size:13px;font-family:inherit;color:var(--txt);background:var(--card);outline:none}
.search-box{flex:1;min-width:150px}
.sel:focus,.search-box:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(55,138,221,.1)}
.filter-count{font-size:12.5px;color:var(--txt2);font-weight:700;white-space:nowrap;margin-left:auto}
.reset-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--txt2);border-radius:var(--r8);padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
.reset-btn:hover{border-color:var(--coral);color:var(--coral)}

/* ── ISSUE CARDS ── */
.issue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.issue-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--sky);border-radius:var(--r12);padding:14px 15px;box-shadow:var(--shadow);transition:.15s;position:relative}
.issue-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.issue-card.dir-급등{border-left-color:var(--red)}
.issue-card.dir-급락{border-left-color:var(--blue)}
.issue-card.dir-보합{border-left-color:var(--gray600)}
.ic-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.ic-name{font-size:16px;font-weight:800;letter-spacing:-.02em}
.ic-code{font-size:11px;color:var(--txt3);font-weight:600;margin-left:5px}
.ic-chg{font-size:16px;font-weight:900;white-space:nowrap}
.ic-chg.up{color:var(--red)} .ic-chg.down{color:var(--blue)} .ic-chg.flat{color:var(--gray600)}
.ic-badges{display:flex;gap:5px;flex-wrap:wrap;margin:9px 0 8px}
.bdg{font-size:10.5px;font-weight:800;padding:2.5px 8px;border-radius:11px;letter-spacing:-.02em;white-space:nowrap}
.ic-summary{font-size:13.5px;font-weight:700;color:var(--txt);line-height:1.5;margin-bottom:4px}
.ic-detail{font-size:12.5px;color:var(--txt2);line-height:1.55}
.ic-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;padding-top:9px;border-top:1px dashed var(--border)}
.ic-meta{font-size:11px;color:var(--txt3);font-weight:600;display:flex;gap:9px;flex-wrap:wrap}
.ic-meta b{color:var(--txt2)}
.ic-score{font-size:11px;font-weight:800;color:var(--purple);background:var(--purple50);padding:2px 9px;border-radius:10px}
.ic-src{font-size:11.5px;color:var(--sky600);font-weight:700;text-decoration:none;white-space:nowrap}
.ic-src:hover{text-decoration:underline}

/* ── TABLE ── */
.sc{background:var(--card);border-radius:var(--r12);border:1px solid var(--border);padding:15px;margin-bottom:14px;box-shadow:var(--shadow)}
.sc-title{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sc-title .sub{font-size:11.5px;font-weight:600;color:var(--txt3)}
.tbl-wrap{overflow-x:auto;border-radius:var(--r8)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--sky50);color:var(--sky800);font-weight:800;font-size:11.5px;padding:9px 8px;text-align:right;white-space:nowrap;position:sticky;top:0}
thead th.l{text-align:left}
tbody td{padding:9px 8px;border-bottom:1px solid var(--border2);text-align:right;white-space:nowrap}
tbody td.l{text-align:left}
tbody tr:hover{background:var(--sky50)}
.t-rank{font-weight:800;color:var(--txt3);width:38px}
.t-name{font-weight:700}
.t-name .c{font-size:10.5px;color:var(--txt3);font-weight:600;margin-left:4px}
.t-up{color:var(--red);font-weight:700} .t-down{color:var(--blue);font-weight:700}
.t-mkt{font-size:10.5px;font-weight:700;padding:1.5px 7px;border-radius:9px;background:var(--gray50);color:var(--gray600)}
.t-issue{cursor:pointer}
.t-flag{font-size:11px;color:var(--coral);font-weight:800;cursor:pointer}

/* ── BAR CHART (horizontal) ── */
.bars{display:flex;flex-direction:column;gap:7px}
.bar-row{display:grid;grid-template-columns:88px 1fr auto;align-items:center;gap:9px}
.bar-lbl{font-size:12px;font-weight:700;color:var(--txt2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{background:var(--bg);border-radius:6px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .5s;min-width:2px}
.bar-val{font-size:11.5px;font-weight:800;color:var(--txt2);min-width:30px;text-align:right}

/* ── DISTRIBUTION GRID ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
.dist{display:flex;flex-direction:column;gap:8px}
.dist-row{display:grid;grid-template-columns:84px 1fr 34px;align-items:center;gap:9px}
.dist-lbl{font-size:12px;font-weight:700;color:var(--txt2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dist-track{background:var(--bg);border-radius:6px;height:16px;overflow:hidden}
.dist-fill{height:100%;border-radius:6px}
.dist-val{font-size:11.5px;font-weight:800;color:var(--txt3);text-align:right}

/* ── TREND (svg) ── */
.trend-wrap{width:100%;overflow-x:auto}
.trend-svg{display:block;min-width:320px}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty .ico{font-size:38px;margin-bottom:10px}
.empty .msg{font-size:14px;font-weight:600}
.empty .sub{font-size:12.5px;margin-top:6px;color:var(--txt3)}
.skel{height:110px;background:linear-gradient(90deg,#eef4fc 25%,#f7faff 50%,#eef4fc 75%);background-size:200% 100%;animation:shim 1.3s infinite;border-radius:var(--r12)}
@keyframes shim{to{background-position:-200% 0}}

/* ── MODAL ── */
#cfgModal{display:none}
#cfgModal.modal-open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000}
.modal-backdrop{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:18px}
.modal-box{background:var(--card);border-radius:var(--r20);padding:24px;width:100%;max-width:450px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;color:var(--txt);margin-bottom:18px;display:flex;align-items:center;gap:7px}
.modal-field{margin-bottom:14px}
.modal-label{font-size:13px;font-weight:700;color:var(--txt2);margin-bottom:6px;display:block}
.modal-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r8);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--txt);outline:none;transition:border .18s}
.modal-input:focus{border-color:var(--sky);background:#fff}
.modal-hint{font-size:11.5px;color:var(--txt3);margin-top:4px;line-height:1.55}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-save{background:var(--sky);border:none;color:#fff;border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;min-height:42px}
.modal-save:hover{background:var(--sky600)}
.modal-cancel{background:var(--bg);border:1.5px solid var(--border);color:var(--txt2);border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:42px}

/* ── TOAST ── */
#toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--txt);color:#fff;padding:11px 20px;border-radius:22px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:9999;max-width:90vw;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .main{padding:11px}
  .issue-grid{grid-template-columns:1fr}
  .kpi-card{min-width:66px;padding:9px 7px}
  .kpi-card .num{font-size:18px}
  .dash-grid{grid-template-columns:1fr}
  .bar-row{grid-template-columns:72px 1fr auto}
  .bar-lbl{font-size:11px}
  .tab-btn{font-size:12px;gap:3px}
}
@media(min-width:601px){.f-sel-wrap{grid-template-columns:repeat(4,1fr)}}
@media(min-width:769px){.logo-title{font-size:18px}}
</style>
</head>
<body>
<div id="toast"></div>

<!-- Notion 설정 모달 -->
<div id="cfgModal">
  <div class="modal-backdrop" onclick="closeCfgModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Notion DB 연동 설정
      </div>
      <div class="modal-field">
        <label class="modal-label">Cloudflare Worker URL</label>
        <input id="cfgWorkerUrl" class="modal-input" type="text" placeholder="https://your-worker.workers.dev"/>
        <div class="modal-hint">Notion API 프록시 주소 · 저장값은 XX로 마스킹 표시 · 브라우저 localStorage에 평문 저장됩니다 (개인 기기 권장)</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">주식이슈 DB ID</label>
        <input id="cfgIssueDbId" class="modal-input" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
        <div class="modal-hint">주식이슈DB · 저장값은 XX로 마스킹 표시</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">거래대금상위 DB ID</label>
        <input id="cfgVolumeDbId" class="modal-input" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
        <div class="modal-hint">주식거래대금상위DB · 저장값은 XX로 마스킹 표시</div>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeCfgModal()">취소</button>
        <button class="modal-save" onclick="saveCfg()">저장 후 불러오기</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="hdr-wrap">
    <div class="header">
      <div class="header-left">
        <div class="logo-mark">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        </div>
        <div>
          <div class="logo-title">주식 이슈</div>
          <div class="logo-sub">거래대금 · 급등락 이슈 분석</div>
        </div>
      </div>
      <div class="header-right">
        <div class="header-btns">
          <button class="hdr-btn" onclick="openCfgModal()" aria-label="연동 설정">
            <span class="hdr-btn-dot off" id="cfgDot"></span>설정
          </button>
          <button class="hdr-btn" id="syncBtn" onclick="loadData()" aria-label="새로고침">
            <svg id="syncIcon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            <span id="syncLabel">새로고침</span>
          </button>
        </div>
        <div class="last-update" id="lastUpdate">&nbsp;</div>
      </div>
    </div>
    <div class="top-nav" id="nav" role="tablist" aria-label="주식 이슈 탭">
      <button class="tab-btn on" data-tab="dash" id="tab-dash" role="tab" aria-selected="true" aria-controls="panel-dash">요약</button>
      <button class="tab-btn" data-tab="issue" id="tab-issue" role="tab" aria-selected="false" aria-controls="panel-issue">이슈</button>
      <button class="tab-btn" data-tab="volume" id="tab-volume" role="tab" aria-selected="false" aria-controls="panel-volume">거래대금</button>
    </div>
  </div>

  <div class="demo-banner" id="demoBanner">● 데모 데이터 표시 중 — 설정에서 Notion DB를 연결하세요</div>
  <div class="main" id="main">
    <div class="panel on" id="panel-dash" role="tabpanel" aria-labelledby="tab-dash" tabindex="0"></div>
    <div class="panel" id="panel-issue" role="tabpanel" aria-labelledby="tab-issue" tabindex="0"></div>
    <div class="panel" id="panel-volume" role="tabpanel" aria-labelledby="tab-volume" tabindex="0"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// 설정 — Notion 연동 (Cloudflare Worker 프록시)

async function fetchNotion(dbId, body){
  const res = await fetch(CFG.workerUrl+'/v1/databases/'+dbId+'/query', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body||{})
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const ct = res.headers.get('content-type')||'';
  if(!ct.includes('application/json')) throw new Error('Worker URL 오류 — JSON이 아닌 응답');
  return res.json();
}
async function fetchAllPages(dbId, sorts){
  const body = { page_size:100 };
  if(sorts) body.sorts = sorts;
  const data = await fetchNotion(dbId, body);
  let pages = data.results||[], cursor=data.next_cursor, hasMore=data.has_more, cnt=0;
  while(cursor && hasMore && ++cnt<50){
    const d2 = await fetchNotion(dbId, {...body, start_cursor:cursor});
    pages = pages.concat(d2.results||[]); cursor=d2.next_cursor; hasMore=d2.has_more;
  }
  return pages;
}
function getVal(p){
  if(!p) return '';
  switch(p.type){
    case 'title':     return (p.title||[]).map(t=>t.plain_text||'').join('');
    case 'rich_text': return (p.rich_text||[]).map(t=>t.plain_text||'').join('');
    case 'select':    return p.select?.name || '';
    case 'number':    return (p.number===null||p.number===undefined)?null:p.number;
    case 'url':       return p.url || '';
    case 'date':{ const s=p.date?.start||''; const m=s.match(/^\d{4}-\d{2}-\d{2}/); return m?m[0]:s.slice(0,10); }
    case 'formula':{ const f=p.formula||{}; return f.type==='number'?f.number : (f.type==='string'?f.string : (f.type==='boolean'?f.boolean:'')); }
    default: return '';
  }
}
function numOr(v){ if(v===''||v===null||v===undefined) return null; const n=Number(v); return isNaN(n)?null:n; }

// 출처 URL 스킴 검증 — http(s)만 링크로 허용 (javascript: 등 차단)
function safeUrl(u){ u=String(u==null?'':u).trim(); return /^https?:\/\//i.test(u)?u:''; }

  return pages.map(pg=>{
    const pr = pg.properties||{};
    return {
      name:String(getVal(pr['종목명'])||'').trim(),
      code:String(getVal(pr['종목코드'])||'').trim(),

function fmtNum(n){ if(n===null||n===undefined||n==='') return '-'; return Number(n).toLocaleString('ko-KR'); }
function fmtPct(n){ if(n===null||n===undefined||n==='') return '-'; const s=n>0?'+':''; return s+Number(n).toFixed(2)+'%'; }
function fmtAmt(n){
  if(n===null||n===undefined||n==='') return '-';
  const v=Number(n);
  if(v>=1e12) return (v/1e12).toFixed(2)+'조';
  if(v>=1e8)  return Math.round(v/1e8).toLocaleString('ko-KR')+'억';
  if(v>=1e4)  return Math.round(v/1e4).toLocaleString('ko-KR')+'만';
  return v.toLocaleString('ko-KR');
}
function chgCls(n){ if(n>0) return 'up'; if(n<0) return 'down'; return 'flat'; }
function dirCls(n){ if(n>0) return 't-up'; if(n<0) return 't-down'; return ''; }
function chgColor(n){ return n>0?'#D8302F':(n<0?'#2563C9':'#7E8CA0'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtDate(d){ if(!d) return '-'; const m=d.match(/^(\d{4})-(\d{2})-(\d{2})/); return m?m[2]+'/'+m[3]:d; }
function distinctDatesDesc(rows){ return [...new Set(rows.map(r=>r.date).filter(Boolean))].sort((a,b)=>b.localeCompare(a)); }

// ── 년/월 계층 날짜 헬퍼 ──
function getYears(dates){ return [...new Set(dates.map(d=>d.slice(0,4)))].sort((a,b)=>b.localeCompare(a)); }
function getMonths(dates, year){ return [...new Set(dates.filter(d=>d.startsWith(year)).map(d=>d.slice(0,7)))].sort((a,b)=>b.localeCompare(a)); }
function getDays(dates, ym){ return dates.filter(d=>d.startsWith(ym)).sort((a,b)=>b.localeCompare(a)); }

// 에러 메시지 → 사용자 친화 문구
function friendlyErr(msg){
  msg = msg||'오류';
  if(msg.includes('401')||msg.includes('403')) return '인증 오류 (API 키 확인)';
  if(msg.includes('404')) return 'DB 없음 (DB ID 확인)';
  if(msg.includes('Worker URL')) return 'Worker URL 오류';
  if(msg.includes('Failed to fetch')) return '네트워크 오류';
  return msg;
}

document.getElementById('nav').addEventListener('click', e=>{
  const btn = e.target.closest('.tab-btn'); if(!btn) return;
  curTab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b=>{ const on=b===btn; b.classList.toggle('on', on); b.setAttribute('aria-selected', on?'true':'false'); });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+curTab).classList.add('on');
  if(curTab==='issue') renderIssues();
  else if(curTab==='volume') renderVolume();
  else renderDash();
});

function filteredIssues(){
  let rows = ISSUES.filter(r=>{
    if(F.dir && r.dir!==F.dir) return false;
    if(F.sector && r.sector!==F.sector) return false;
    if(F.trig && r.trig!==F.trig) return false;
    if(F.strength && r.strength!==F.strength) return false;
    if(F.date && r.date!==F.date) return false;
    if(F.q){ const q=F.q.toLowerCase(); const hay=(r.name+' '+r.code+' '+r.summary+' '+r.detail+' '+r.sector).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  rows.sort((a,b)=>{
    if(SORT==='score') return (b.score??-1e9)-(a.score??-1e9) || b.date.localeCompare(a.date);
    if(SORT==='date')  return b.date.localeCompare(a.date) || (b.score??-1e9)-(a.score??-1e9);
    if(SORT==='chg')   return Math.abs(b.chg??0)-Math.abs(a.chg??0) || b.date.localeCompare(a.date);
    if(SORT==='strength') return (STRENGTH_ORD[a.strength]??9)-(STRENGTH_ORD[b.strength]??9) || b.date.localeCompare(a.date);
    return 0;
  });
  return rows;
}

function issueKpiHtml(rows){
  const up = rows.filter(r=>r.dir==='급등').length;
  const down = rows.filter(r=>r.dir==='급락').length;
  const core = rows.filter(r=>r.strength==='🔴 핵심').length;
  return '<div class="kpi-row">'
    +   '<div class="kpi-card kpi-tot"><div class="num">'+rows.length+'</div><div class="lbl">이슈</div></div>'
    +   '<div class="kpi-card kpi-up"><div class="num">'+up+'</div><div class="lbl">급등</div></div>'
    +   '<div class="kpi-card kpi-down"><div class="num">'+down+'</div><div class="lbl">급락</div></div>'
    +   '<div class="kpi-card kpi-core"><div class="num">'+core+'</div><div class="lbl">🔴 핵심</div></div>'
    + '</div>';
}
function issueResultsHtml(rows){
  if(!rows.length) return '<div class="empty"><div class="ico">🔍</div><div class="msg">조건에 맞는 이슈가 없습니다</div><div class="sub">필터를 변경해 보세요</div></div>';
  return '<div class="issue-grid">'+rows.map(issueCard).join('')+'</div>';
}

function fSel(label, key, opts){
  var cur = F[key]||'';
  var active = cur !== '';
  var s = '<select class="f-sel'+(active?' active':'')+'" onchange="setF(\''+key+'\',this.value)" aria-label="'+label+'">';
  for(var i=0;i<opts.length;i++){
    var o=opts[i], val=(o==='전체')?'':o;
    s += '<option value="'+esc(val)+'"'+(cur===val?' selected':'')+'>'+esc(o==='전체'?label:o)+'</option>';
  }
  s += '</select>';
  return s;
}
function activeChipsHtml(){
  var map=[{k:'dir',l:'방향'},{k:'strength',l:'강도'},{k:'sector',l:'섹터'},{k:'trig',l:'트리거'}];
  var chips=[];
  for(var i=0;i<map.length;i++){
    var m=map[i];
    if(F[m.k]) chips.push('<span class="f-active-chip">'+esc(m.l)+': '+esc(F[m.k])+'<span class="x" onclick="setF(\''+m.k+'\',\'\')"> ✕</span></span>');
  }
  return chips.length?'<div class="f-active-chips">'+chips.join('')+'</div>':'';
}
function renderIssues(){
  var panel = document.getElementById('panel-issue');
  if(!ISSUES.length){ panel.innerHTML = emptyOrSkeleton('이슈'); return; }
  var dates = distinctDatesDesc(ISSUES);
  var years = getYears(dates);
  if(!F.year && years.length) F.year = years[0];
  var months = F.year ? getMonths(dates, F.year) : [];
  if(!F.month && months.length) F.month = months[0];
  var days = (F.year && F.month) ? getDays(dates, F.month) : [];
  // 날짜 필터 기본값: 전체(빈 문자열) — 특정 날짜를 강제 선택하지 않음
  var rows = filteredIssues();
  var yearOpts = years.map(function(y){
    return '<option value="'+y+'"'+(F.year===y?' selected':'')+'>'+y+'년</option>';
  }).join('');
  var monthOpts = months.map(function(m){
    return '<option value="'+m+'"'+(F.month===m?' selected':'')+'>'+Number(m.slice(5))+'월</option>';
  }).join('');
  var dayOpts = '<option value=""'+(F.date===''?' selected':'')+'>전체</option>'
    + days.map(function(d){
        return '<option value="'+d+'"'+(F.date===d?' selected':'')+'>'+d.slice(8)+'일</option>';
      }).join('');
  var html = ''
  + '<div id="issue-kpi">'+issueKpiHtml(rows)+'</div>'
  + '<div class="toolbar">'
  +   '<div class="f-sel-wrap">'
  +     fSel('방향','dir',['전체'].concat(DIRS))
  +     fSel('강도','strength',['전체'].concat(STRENGTHS))
  +     fSel('섹터','sector',['전체'].concat(SECTORS))
  +     fSel('트리거','trig',['전체'].concat(TRIGS))
  +   '</div>'
  +   activeChipsHtml()
  +   '<div class="f-row" style="gap:7px;flex-wrap:wrap">'
  +     '<select class="sel" style="min-width:80px" onchange="setIssueYear(this.value)">'+yearOpts+'</select>'
  +     '<select class="sel" style="min-width:60px" onchange="setIssueMonth(this.value)">'+monthOpts+'</select>'
  +     '<select class="sel" style="min-width:60px" onchange="setIssueDay(this.value)">'+dayOpts+'</select>'
  +     '<select class="sel" onchange="setSort(this.value)">'
  +       '<option value="score"'+(SORT==='score'?' selected':'')+'>점수순</option>'
  +       '<option value="date"'+(SORT==='date'?' selected':'')+'>최신순</option>'
  +       '<option value="chg"'+(SORT==='chg'?' selected':'')+'>등락률순</option>'
  +       '<option value="strength"'+(SORT==='strength'?' selected':'')+'>강도순</option>'
  +     '</select>'
  +   '</div>'
  +   '<div class="f-row" style="margin-top:7px">'
  +     '<input class="search-box" type="text" placeholder="종목·키워드 검색" value="'+esc(F.q)+'" oninput="setQ(this.value)"/>'
  +     '<button class="reset-btn" onclick="resetF()">초기화</button>'
  +   '</div>'
  + '</div>'
  + '<div id="issue-results">'+issueResultsHtml(rows)+'</div>';
  panel.innerHTML = html;
}
function refreshIssues(){
  const rows = filteredIssues();
  const k = document.getElementById('issue-kpi'); if(k) k.innerHTML = issueKpiHtml(rows);
  const r = document.getElementById('issue-results'); if(r) r.innerHTML = issueResultsHtml(rows);
}

// 컬러값 whitelist 검증 — Notion 데이터에서 악의적 CSS 주입 방어
function safeColor(hex){ return /^#[0-9A-Fa-f]{3,8}$/.test(hex) ? hex : '#7E8CA0'; }

function issueCard(r){
  const badges = [];
  const c1=safeColor(DIR_COLOR[r.dir]||'#7E8CA0');
  const c2=safeColor(STRENGTH_COLOR[r.strength]||'#94A3B8');
  const c3=safeColor(SECTOR_COLOR[r.sector]||'#7E8CA0');
  const c4=safeColor(TRIG_COLOR[r.trig]||'#7E8CA0');
  if(r.dir) badges.push('<span class="bdg" style="background:'+withAlpha(c1)+';color:'+c1+'">'+esc(r.dir)+'</span>');
  if(r.strength) badges.push('<span class="bdg" style="background:'+withAlpha(c2)+';color:'+c2+'">'+esc(r.strength)+'</span>');
  if(r.sector) badges.push('<span class="bdg" style="background:'+withAlpha(c3)+';color:'+c3+'">'+esc(r.sector)+'</span>');
  if(r.trig) badges.push('<span class="bdg" style="background:'+withAlpha(c4)+';color:'+c4+'">'+esc(r.trig)+'</span>');
  const meta = ['<span><b>'+fmtDate(r.date)+'</b></span>'];
  if(r.close!=null) meta.push('<span>종가 <b>'+fmtNum(r.close)+'</b></span>');
  const safeSrc = safeUrl(r.src);
  return ''
  + '<div class="issue-card dir-'+esc(r.dir)+'">'
  +   '<div class="ic-top">'
  +     '<div class="ic-name">'+esc(r.name)+'<span class="ic-code">'+esc(r.code)+'</span></div>'
  +     '<div class="ic-chg '+chgCls(r.chg||0)+'">'+fmtPct(r.chg)+'</div>'
  +   '</div>'
  +   '<div class="ic-badges">'+badges.join('')+'</div>'
  +   (r.summary?'<div class="ic-summary">'+esc(r.summary)+'</div>':'')
  +   (r.detail?'<div class="ic-detail">'+esc(r.detail)+'</div>':'')
  +   '<div class="ic-foot">'
  +     '<div class="ic-meta">'+meta.join('')+(r.score!=null&&!isNaN(Number(r.score))?'<span class="ic-score">점수 '+Number(r.score)+'</span>':'')+'</div>'
  +     (safeSrc?'<a class="ic-src" href="'+esc(safeSrc)+'" target="_blank" rel="noopener">기사 →</a>':'')
  +   '</div>'
  + '</div>';
}

function setF(k,v){ F[k]=v; refreshIssues(); }
function setSort(v){ SORT=v; refreshIssues(); }
function setQ(v){ F.q=v; refreshIssues(); }
function resetF(){ F={dir:'',sector:'',trig:'',strength:'',date:'',q:'',year:'',month:''}; SORT='score'; renderIssues(); }
function setIssueDay(d){ F.date=d; refreshIssues(); }
function setIssueYear(y){
  F.year=y; F.month=''; F.date='';
  var dates=distinctDatesDesc(ISSUES);
  var months=getMonths(dates,y);
  if(months.length){ F.month=months[0]; var days=getDays(dates,months[0]); if(days.length) F.date=days[0]; }
  renderIssues();
}
function setIssueMonth(m){
  F.month=m; F.date='';
  var dates=distinctDatesDesc(ISSUES);
  var days=getDays(dates,m);
  if(days.length) F.date=days[0];
  renderIssues();
}
// resetF 후 renderIssues 내부에서 자동채움

function emptyOrSkeleton(label){

}

// 거래대금 탭
// ════════════════════════════════════════════════
function renderVolume(){
  const panel = document.getElementById('panel-volume');
  if(!VOLUMES.length){ panel.innerHTML = (!CFG.workerUrl)?emptyOrSkeleton('거래대금'):'<div class="sc"><div class="skel" style="height:300px"></div></div>'; return; }
  const dates = distinctDatesDesc(VOLUMES);
  // 년/월/일 계층 자동선택
  var volYears = getYears(dates);
  if(!VOL_YEAR && volYears.length) VOL_YEAR = volYears[0];
  var volMonths = VOL_YEAR ? getMonths(dates, VOL_YEAR) : [];
  if(!VOL_MONTH && volMonths.length) VOL_MONTH = volMonths[0];
  var volDays = (VOL_YEAR && VOL_MONTH) ? getDays(dates, VOL_MONTH) : [];
  if(!VOL_DATE && volDays.length) VOL_DATE = volDays[0];
  if(VOL_DATE && !dates.includes(VOL_DATE)) VOL_DATE = volDays[0]||'';
  // 방어: VOL_DATE가 여전히 빈 문자열이면 가장 최근 날짜로 강제 설정
  if(!VOL_DATE && dates.length) VOL_DATE = dates[0];
  let rows = VOLUMES.filter(r=>r.date===VOL_DATE).sort((a,b)=>(a.rank??999)-(b.rank??999));
  const issueKey = new Set(ISSUES.filter(i=>i.date===VOL_DATE).map(i=>i.code||i.name));
  const totalAmt = rows.reduce((s,r)=>s+(r.amt||0),0);
  const upN = rows.filter(r=>r.chg>0).length;
  const downN = rows.filter(r=>r.chg<0).length;
  const avgChg = rows.length? rows.reduce((s,r)=>s+(r.chg||0),0)/rows.length : 0;
  const top = rows.slice(0,15);
  const maxAmt = Math.max.apply(null, top.map(r=>r.amt||0).concat([1]));
  var volYearOpts = volYears.map(function(y){ return '<option value="'+y+'" '+(VOL_YEAR===y?'selected':'')+'>'+y+'년</option>'; }).join('');
  var volMonthOpts = volMonths.map(function(m){ return '<option value="'+m+'" '+(VOL_MONTH===m?'selected':'')+'>'+Number(m.slice(5))+'월</option>'; }).join('');
  var volDayOpts = volDays.map(function(d){ return '<option value="'+d+'" '+(VOL_DATE===d?'selected':'')+'>'+d.slice(8)+'일</option>'; }).join('');
  let html = ''
  + '<div class="kpi-row">'
  +   '<div class="kpi-card kpi-amt"><div class="num">'+fmtAmt(totalAmt)+'</div><div class="lbl">거래대금 합계</div></div>'
  +   '<div class="kpi-card kpi-up"><div class="num">'+upN+'</div><div class="lbl">상승</div></div>'
  +   '<div class="kpi-card kpi-down"><div class="num">'+downN+'</div><div class="lbl">하락</div></div>'
  +   '<div class="kpi-card '+(avgChg>=0?'kpi-up':'kpi-down')+'">'+'<div class="num">'+fmtPct(avgChg)+'</div><div class="lbl">평균 등락률</div></div>'
  + '</div>'
  + '<div class="f-row" style="margin-bottom:14px;gap:7px;flex-wrap:wrap">'
  +   '<select class="sel" style="min-width:80px" onchange="setVolYear(this.value)">'+volYearOpts+'</select>'
  +   '<select class="sel" style="min-width:60px" onchange="setVolMonth(this.value)">'+volMonthOpts+'</select>'
  +   '<select class="sel" style="min-width:60px" onchange="setVolDate(this.value)">'+volDayOpts+'</select>'
  +   '<span class="filter-count">'+rows.length+'개 종목 · 거래대금 상위</span>'
  + '</div>'
  + '<div class="sc">'
  +   '<div class="sc-title">거래대금 상위 '+top.length+' <span class="sub">'+VOL_DATE+'</span></div>'
  +   '<div class="bars">'
  +     top.map(r=>{
          const w=Math.max((r.amt||0)/maxAmt*100,1);
          const col = chgColor(r.chg||0);
          return '<div class="bar-row">'
            + '<div class="bar-lbl" title="'+esc(r.name)+'">'+esc(r.name)+'</div>'
            + '<div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+col+'"></div></div>'
            + '<div class="bar-val">'+fmtAmt(r.amt)+'</div>'
          + '</div>';
        }).join('')
  +   '</div>'
  + '</div>'
  + '<div class="sc">'
  +   '<div class="sc-title">전체 순위 <span class="sub">🔖 = 이슈 등록 종목 (클릭 시 이슈 탭으로)</span></div>'
  +   '<div class="tbl-wrap"><table>'
  +     '<thead><tr><th>순위</th><th class="l">종목</th><th>시장</th><th>종가</th><th>등락률</th><th>거래량</th><th>거래대금</th></tr></thead>'
  +     '<tbody>'
  +       rows.map(r=>{
            const k=r.code||r.name; const hasIssue=issueKey.has(k);
            return '<tr class="'+(hasIssue?'t-issue':'')+'" '+(hasIssue?'onclick="jumpIssue(\''+esc(k)+'\')"':'')+'>'
              + '<td class="t-rank">'+(r.rank??'-')+'</td>'
              + '<td class="l t-name">'+(hasIssue?'<span class="t-flag">🔖 </span>':'')+esc(r.name)+'<span class="c">'+esc(r.code)+'</span></td>'
              + '<td><span class="t-mkt">'+esc(r.mkt||'-')+'</span></td>'
              + '<td>'+fmtNum(r.close)+'</td>'
              + '<td class="'+dirCls(r.chg||0)+'">'+fmtPct(r.chg)+'</td>'
              + '<td>'+fmtNum(r.vol)+'</td>'
              + '<td>'+fmtAmt(r.amt)+'</td>'
            + '</tr>';
          }).join('')
  +     '</tbody>'
  +   '</table></div>'
  + '</div>';
  panel.innerHTML = html;
}
function setVolDate(d){ VOL_DATE=d; renderVolume(); }
function setVolYear(y){
  VOL_YEAR=y; VOL_MONTH=''; VOL_DATE='';
  var dates=distinctDatesDesc(VOLUMES);
  var months=getMonths(dates,y);
  if(months.length){ VOL_MONTH=months[0]; var days=getDays(dates,months[0]); if(days.length) VOL_DATE=days[0]; }
  renderVolume();
}
function setVolMonth(m){
  VOL_MONTH=m; VOL_DATE='';
  var dates=distinctDatesDesc(VOLUMES);
  var days=getDays(dates,m);
  if(days.length) VOL_DATE=days[0];
  renderVolume();
}
function jumpIssue(key){
  F={dir:'',sector:'',trig:'',strength:'',date:'',q:'',year:'',month:''};
  const it = ISSUES.find(i=>(i.code||i.name)===key);
  if(it){
    F.q = it.name;
    // 이슈가 특정 날짜에만 있을 경우 해당 날짜로 필터 복원
    if(it.date){
      F.year  = it.date.slice(0,4);
      F.month = it.date.slice(0,7);
      F.date  = it.date;
    }
  }
  document.querySelector('.tab-btn[data-tab="issue"]').click();
}

// ════════════════════════════════════════════════
// 대시보드 탭
// ════════════════════════════════════════════════
function renderDash(){
  const panel = document.getElementById('panel-dash');
  if(!ISSUES.length){ panel.innerHTML = (!CFG.workerUrl)?emptyOrSkeleton('대시보드'):'<div class="sc"><div class="skel" style="height:280px"></div></div>'; return; }
  const dates = distinctDatesDesc(ISSUES);
  const latest = dates[0];
  const todays = ISSUES.filter(r=>r.date===latest);
  const countBy = (rows,key)=>{ const m={}; rows.forEach(r=>{ const v=r[key]||'기타'; m[v]=(m[v]||0)+1; }); return m; };
  const secM = countBy(ISSUES,'sector');
  const strM = countBy(ISSUES,'strength');
  const trM = countBy(ISSUES,'trig');
  const dirM = countBy(ISSUES,'dir');
  const upT = dirM['급등']||0, downT = dirM['급락']||0;
  const coreT = strM['🔴 핵심']||0;
  const dateCnt = {}; ISSUES.forEach(r=>{ if(r.date) dateCnt[r.date]=(dateCnt[r.date]||0)+1; });
  // sort()로 날짜 오름차순 정렬 후 slice — trendVals는 반드시 trendDates 기반으로 매핑
  const trendDates = Object.keys(dateCnt).sort().slice(-14);
  const trendVals = trendDates.map(d=>dateCnt[d]||0);

  function distBars(map, colorMap, order){
    const keys = (order||Object.keys(map)).filter(k=>map[k]);
    const extra = Object.keys(map).filter(k=>!keys.includes(k) && map[k]>0);
    const all = keys.concat(extra);
    const max = Math.max.apply(null, all.map(k=>map[k]).concat([1]));
    return '<div class="dist">'+all.map(k=>{
      const c = (colorMap&&colorMap[k])||'#7E8CA0';
      const w = map[k]/max*100;
      return '<div class="dist-row">'
        + '<div class="dist-lbl" title="'+esc(k)+'">'+esc(k)+'</div>'
        + '<div class="dist-track"><div class="dist-fill" style="width:'+w+'%;background:'+c+'"></div></div>'
        + '<div class="dist-val">'+map[k]+'</div>'
      + '</div>';
    }).join('')+'</div>';
  }

  let html = ''
  + '<div class="kpi-row">'
  +   '<div class="kpi-card kpi-tot"><div class="num">'+ISSUES.length+'</div><div class="lbl">누적 이슈</div></div>'
  +   '<div class="kpi-card kpi-teal"><div class="num">'+dates.length+'</div><div class="lbl">기록 일수</div></div>'
  +   '<div class="kpi-card kpi-up"><div class="num">'+upT+'</div><div class="lbl">급등</div></div>'
  +   '<div class="kpi-card kpi-down"><div class="num">'+downT+'</div><div class="lbl">급락</div></div>'
  +   '<div class="kpi-card kpi-core"><div class="num">'+coreT+'</div><div class="lbl">🔴 핵심</div></div>'
  + '</div>'
  + '<div class="sc">'
  +   '<div class="sc-title">최근 시황 <span class="sub">'+latest+' · '+todays.length+'건</span></div>'
  +   todaysSummary(todays)
  + '</div>'
  + '<div class="sc">'
  +   '<div class="sc-title">일자별 이슈 추이 <span class="sub">최근 '+trendDates.length+'일</span></div>'
  +   '<div class="trend-wrap">'+trendSvg(trendDates, trendVals)+'</div>'
  + '</div>'
  + '<div class="dash-grid">'
  +   '<div class="sc"><div class="sc-title">섹터 분포</div>'+distBars(secM, SECTOR_COLOR, SECTORS)+'</div>'
  +   '<div class="sc"><div class="sc-title">이슈강도 분포</div>'+distBars(strM, STRENGTH_COLOR, STRENGTHS)+'</div>'
  +   '<div class="sc"><div class="sc-title">트리거 분포</div>'+distBars(trM, TRIG_COLOR, TRIGS)+'</div>'
  +   '<div class="sc"><div class="sc-title">방향 분포</div>'+distBars(dirM, DIR_COLOR, DIRS)+'</div>'
  + '</div>';
  panel.innerHTML = html;
}

function todaysSummary(rows){
  if(!rows.length) return '<div class="empty" style="padding:20px"><div class="msg">해당 일자 이슈 없음</div></div>';
  const sorted = [...rows].sort((a,b)=>(b.score??-1e9)-(a.score??-1e9)).slice(0,6);
  return '<div class="bars">'+sorted.map(r=>{
    const col = DIR_COLOR[r.dir]||'#7E8CA0';
    return '<div class="bar-row" style="grid-template-columns:96px 1fr auto;cursor:pointer" onclick="jumpIssue(\''+esc(r.code||r.name)+'\')">'
      + '<div class="bar-lbl" title="'+esc(r.name)+'" style="color:'+col+'">'+esc(r.name)+'</div>'
      + '<div style="font-size:12px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.summary||r.detail||'')+'</div>'
      + '<div class="bar-val" style="color:'+chgColor(r.chg)+'">'+fmtPct(r.chg)+'</div>'
    + '</div>';
  }).join('')+'</div>';
}

function trendSvg(dates, vals){
  if(!dates.length) return '';
  const W=Math.max(dates.length*46, 320), H=170, padL=28,padR=12,padT=14,padB=30;
  const iw=W-padL-padR, ih=H-padT-padB;
  const max=Math.max.apply(null, vals.concat([1]));
  const x=i=>padL + (dates.length<=1?iw/2:i/(dates.length-1)*iw);
  const y=v=>padT + ih - (v/max*ih);
  const pts=vals.map((v,i)=>x(i)+','+y(v)).join(' ');
  const area=padL+','+(padT+ih)+' '+pts+' '+x(dates.length-1)+','+(padT+ih);
  let grid='';
  for(let g=0; g<=2; g++){ const gv=Math.round(max/2*g); const gy=y(gv); grid+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="#E0EAF5" stroke-width="1"/><text x="'+(padL-5)+'" y="'+(gy+3)+'" text-anchor="end" font-size="9" fill="#6B7E99">'+gv+'</text>'; }
  const dots=vals.map((v,i)=>'<circle cx="'+x(i)+'" cy="'+y(v)+'" r="3.5" fill="#378ADD"/><text x="'+x(i)+'" y="'+(y(v)-8)+'" text-anchor="middle" font-size="9" font-weight="700" fill="#185FA5">'+v+'</text>').join('');
  const labels=dates.map((d,i)=>'<text x="'+x(i)+'" y="'+(H-10)+'" text-anchor="middle" font-size="9" fill="#6B7E99">'+d.slice(5)+'</text>').join('');
  return '<svg class="trend-svg" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">'
    + grid
    + '<polygon points="'+area+'" fill="rgba(55,138,221,.10)"/>'
    + '<polyline points="'+pts+'" fill="none" stroke="#378ADD" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'
    + dots + labels
  + '</svg>';
}

// ════════════════════════════════════════════════
// 설정 모달 / 마스킹
// ════════════════════════════════════════════════
function maskVal(v){
  if(!v) return '';
  if(v.startsWith('http')){
    try{ const u=new URL(v); const h=u.hostname; const parts=h.split('.');
      const masked=parts[0].length>4?parts[0].slice(0,2)+'XX'+parts[0].slice(-2)+'.'+parts.slice(1).join('.'):'XX.'+parts.slice(1).join('.');
      return u.protocol+'//'+masked;
    }catch(e){ return v.slice(0,6)+'XX...XX'+v.slice(-4); }
  }
  if(/^[0-9a-f\-]{32,36}$/i.test(v)){ const c=v.replace(/-/g,''); return c.slice(0,4)+'-XXXX-XXXX-XXXX-'+c.slice(-4); }
  return v.slice(0,3)+'XX...XX'+v.slice(-3);
}
function openCfgModal(){
  const set=(id,val)=>{ const el=document.getElementById(id); if(!el) return; if(val){ el.value=''; el.placeholder=maskVal(val); el.dataset.saved='1'; } else { el.value=''; delete el.dataset.saved; } };
  set('cfgWorkerUrl', CFG.workerUrl); set('cfgIssueDbId', CFG.issueDbId); set('cfgVolumeDbId', CFG.volumeDbId);
  const m=document.getElementById('cfgModal'); if(m){ m.classList.add('modal-open'); document.body.style.overflow='hidden'; }
}
function closeCfgModal(e){ if(e&&e.target!==e.currentTarget) return; const m=document.getElementById('cfgModal'); if(m){ m.classList.remove('modal-open'); document.body.style.overflow=''; } }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeCfgModal(); });
function saveCfg(){
  const w=document.getElementById('cfgWorkerUrl').value.trim();
  const i=document.getElementById('cfgIssueDbId').value.trim();
  const v=document.getElementById('cfgVolumeDbId').value.trim();
  if(w) CFG.workerUrl=w; if(i) CFG.issueDbId=i; if(v) CFG.volumeDbId=v;
  try{ localStorage.setItem('si_workerUrl',CFG.workerUrl); localStorage.setItem('si_issueDbId',CFG.issueDbId); localStorage.setItem('si_volumeDbId',CFG.volumeDbId); }catch(e){}
  closeCfgModal(); loadData();
}
function updateCfgStatus(ok){
  const dot=document.getElementById('cfgDot'); if(dot) dot.classList.toggle('off', !ok);
  const lu=document.getElementById('lastUpdate'); if(!lu) return;
  if(ok===true){ const n=new Date(); lu.textContent='업데이트 '+String(n.getMonth()+1).padStart(2,'0')+'.'+String(n.getDate()).padStart(2,'0')+' '+n.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); lu.style.color='rgba(255,255,255,.75)'; }
  else if(ok===false){ lu.textContent='⚠ 로드 실패 — 설정 확인'; lu.style.color='rgba(255,170,150,.95)'; }
}

function toast(msg){ const t=document.getElementById('toast'); if(!t) return; t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800); }

// ════════════════════════════════════════════════
// 데모 폴백
// ════════════════════════════════════════════════
function loadDemo(reason){
  IS_DEMO = true;
  ISSUES = DEMO_ISSUES.slice();
  VOLUMES = DEMO_VOLUMES.slice();
  VOL_DATE='';
  if(curTab==='dash') renderDash(); else if(curTab==='issue') renderIssues(); else renderVolume();
  const lu=document.getElementById('lastUpdate'); if(lu){ lu.textContent='● 데모 데이터 (미연결)'; lu.style.color='rgba(255,214,150,.95)'; }
  const dot=document.getElementById('cfgDot'); if(dot) dot.classList.add('off');
  const banner=document.getElementById('demoBanner'); if(banner) banner.classList.add('on');
  toast('데모 데이터 표시 — '+(reason||'미리보기용'));
}

// ════════════════════════════════════════════════
// 데이터 로드
// ════════════════════════════════════════════════
async function loadData(){
  if(!CFG.workerUrl){ openCfgModal(); return; }
  const btn=document.getElementById('syncBtn'), ico=document.getElementById('syncIcon'), lab=document.getElementById('syncLabel');
  if(btn) btn.disabled=true; if(ico) ico.classList.add('spinning'); if(lab) lab.textContent='로딩…';
  if(curTab==='issue' && !IS_DEMO) document.getElementById('panel-issue').innerHTML = emptyOrSkeleton('이슈');
  try{
    // DB별로 개별 처리 — 한쪽이 실패해도 성공한 쪽 데이터는 유지
    let issuePages=null, volPages=null; const errs=[];
    await Promise.all([
      fetchAllPages(CFG.issueDbId, [{property:'날짜',direction:'descending'}])
        .then(p=>{ issuePages=p; }).catch(e=>{ errs.push('이슈 '+friendlyErr(e.message)); }),
      fetchAllPages(CFG.volumeDbId, [{property:'날짜',direction:'descending'},{property:'순위',direction:'ascending'}])
        .then(p=>{ volPages=p; }).catch(e=>{ errs.push('거래대금 '+friendlyErr(e.message)); }),
    ]);
    // 둘 다 실패한 경우에만 데모로 폴백
    if(issuePages===null && volPages===null){ loadDemo(errs.join(' / ')||'로드 실패'); return; }
    IS_DEMO = false;
    if(issuePages!==null) ISSUES = parseIssues(issuePages);
    if(volPages!==null)   VOLUMES = parseVolumes(volPages);
    // 새 데이터에 없는 날짜 필터는 초기화 (빈 화면 방지)
    const allDates = distinctDatesDesc(ISSUES);
    if(F.date && !allDates.includes(F.date)) F.date='';
    VOL_DATE='';
    if(curTab==='dash') renderDash(); else if(curTab==='issue') renderIssues(); else renderVolume();
    updateCfgStatus(true);
    IS_DEMO = false;
    const banner=document.getElementById('demoBanner'); if(banner) banner.classList.remove('on');
    toast(errs.length ? ('일부 로드 실패 — '+errs.join(' / ')) : ('로드 완료 — 이슈 '+ISSUES.length+'건 · 거래대금 '+VOLUMES.length+'건'));
  }catch(e){
    loadDemo(friendlyErr(e.message));
  }finally{
    if(btn) btn.disabled=false; if(ico) ico.classList.remove('spinning'); if(lab) lab.textContent='새로고침';
  }
}

// ── 헤더 높이 보정 (ResizeObserver 단일 등록, 미지원 시 resize 폴백) ──
function applyHeaderOffset(){ const h=document.querySelector('.hdr-wrap'), m=document.getElementById('main'); if(h&&m) m.style.paddingTop=(h.offsetHeight+8)+'px'; }
if(typeof ResizeObserver!=='undefined'){
  const el=document.querySelector('.hdr-wrap');
  if(el){ new ResizeObserver(applyHeaderOffset).observe(el); applyHeaderOffset(); }
} else {
  applyHeaderOffset();
  window.addEventListener('resize', applyHeaderOffset);
}

// ── 초기 진입 ──
(function init(){
  updateCfgStatus(undefined);
  if(CFG.workerUrl){ loadData(); }
  else { loadDemo('설정에서 Notion DB 연결'); renderDash(); }
})();
</script>
